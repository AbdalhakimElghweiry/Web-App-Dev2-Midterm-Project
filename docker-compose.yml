# Daily Habit Builder — app + MySQL (recommended on Windows instead of multi-line `docker run`).
#
# Usage (from project root):
#   docker compose up --build
# Then open http://localhost:8080
#
# First boot runs migrations when RUN_MIGRATIONS=true (see docker/entrypoint.sh).

services:
  mysql:
    image: mysql:8.0
    container_name: dhb-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: daily_habit_builder
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - dhb_mysql_data:/var/lib/mysql
    ports:
      - "33060:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s

  app:
    build: .
    container_name: dhb-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8080"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: daily_habit_builder
      DB_USERNAME: root
      DB_PASSWORD: secret
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      RUN_MIGRATIONS: "true"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  dhb_mysql_data:
